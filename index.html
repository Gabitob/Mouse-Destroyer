<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mouse Destroyer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page-wrapper">
    <div class="money-box">Dinheiro: R$ 0</div>
    <div class="content-row">
      <div class="center-box">
        <div class="enemy-layer"></div>
      </div>
      <aside class="right-sidebar">
        <div class="sidebar-title">Upgrades</div>
        <div class="upgrade-list">
          <button id="pulse-upgrade" class="upgrade-button" data-cost="200" data-label="Velocidade do Pulso">Velocidade do Pulso - R$ 200</button>
          <button id="enemy-limit-upgrade" class="upgrade-button" data-cost="50" data-label="+5 Inimigos">+5 Inimigos - R$ 50</button>
          <button id="double-money-upgrade" class="upgrade-button" data-cost="150" data-label="X2 Dinheiro">X2 Dinheiro - R$ 150</button>
        </div>
      </aside>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
