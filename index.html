<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mouse Destroyer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page-wrapper">
    <div class="money-box">
      <div id="money-display" class="money-label">Dinheiro: R$ 0</div>
      <button id="music-toggle" class="music-toggle" type="button" aria-label="Alternar música de fundo" aria-pressed="true">
        <span class="music-toggle__icon" aria-hidden="true">♪</span>
        <span class="music-toggle__label">Música</span>
      </button>
      <button id="sfx-toggle" class="music-toggle sfx-toggle" type="button" aria-label="Alternar efeitos sonoros" aria-pressed="true">
        <span class="music-toggle__icon" aria-hidden="true">🔊</span>
        <span class="music-toggle__label">Efeitos</span>
      </button>
    </div>
    <div class="content-row">
      <div class="center-box">
        <div class="enemy-layer"></div>
      </div>
      <aside class="right-sidebar">
        <div class="sidebar-title">Upgrades</div>
        <div class="upgrade-list">
          <button id="pulse-upgrade" class="upgrade-button" data-cost="200" data-label="Velocidade do Pulso">Velocidade do Pulso (+50%) - R$ 200</button>
          <button id="enemy-limit-upgrade" class="upgrade-button" data-cost="50" data-label="+5 Inimigos">+5 Inimigos - R$ 50</button>
          <button id="double-money-upgrade" class="upgrade-button" data-cost="150" data-label="X2 Dinheiro">X2 Dinheiro - R$ 150</button>
          <button id="explosion-duration-upgrade" class="upgrade-button" data-cost="100" data-label="Duração da Explosão">Duração da Explosão (+50%) - R$ 100</button>
          <button id="cigarette-upgrade" class="upgrade-button" data-cost="300" data-label="Cigarro">Cigarro - R$ 300</button>
          <button id="cigarette-chance-upgrade" class="upgrade-button" data-cost="1000" data-label="Chance de Cigarro" style="display: none;">Chance de Cigarro (+30%) - R$ 1000</button>
        </div>
      </aside>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
